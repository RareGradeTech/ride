<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VynixRide — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0052FF;--blue2:#3377FF;--glow:rgba(0,82,255,.25);
  --ink:#001A4D;--bg:#F4F7FF;--card:#FFFFFF;--muted:#667A99;
  --border:#DDE5F5;--green:#17A85A;--red:#E53535;--orange:#F59E0B;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;color:var(--ink);background:#001A4D}

/* ══ INIT LOADER ══ */
.init-loader{position:fixed;inset:0;background:#001A4D;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s var(--ease-smooth)}
.init-loader.hide{opacity:0;pointer-events:none}
.loader-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ AUTH OVERLAY ══ */
.auth-overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;font-family:'Outfit',sans-serif;overflow:hidden}
.auth-bg{position:absolute;inset:0;background:url('https://i.postimg.cc/FHXNkL7D/c-SZtc.jpg') center center/cover no-repeat;transform:scale(1.04);animation:authZoom 18s ease-in-out infinite alternate}
@keyframes authZoom{from{transform:scale(1.04)}to{transform:scale(1.12)}}
.auth-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,26,77,.2) 0%,rgba(0,26,77,.4) 30%,rgba(0,26,77,.7) 65%,rgba(0,26,77,.95) 100%)}
.auth-topbar{position:relative;z-index:2;display:flex;align-items:center;gap:12px;padding:56px 28px 0}
.auth-logo-dot{width:44px;height:44px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--blue);flex-shrink:0;box-shadow:0 4px 18px rgba(0,0,0,.28)}
.auth-logo-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.3px;text-shadow:0 2px 12px rgba(0,0,0,.35)}
.auth-spacer{flex:1;position:relative;z-index:2}
.auth-bottom{position:relative;z-index:2;padding:32px 28px calc(44px + var(--sb))}
.auth-headline{font-size:clamp(32px,8vw,46px);font-weight:800;color:#fff;line-height:1.12;letter-spacing:-1px;margin-bottom:12px;text-shadow:0 2px 16px rgba(0,0,0,.3)}
.auth-subline{font-size:15px;color:rgba(255,255,255,.68);font-weight:400;margin-bottom:36px;line-height:1.55;max-width:320px}
.auth-pills{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.pill-login{width:100%;padding:18px 28px;border-radius:100px;border:none;background:#fff;color:#0C0C14;font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:-.1px;box-shadow:0 6px 28px rgba(0,0,0,.32);display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .2s var(--ease-spring),box-shadow .2s}
.pill-login:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.4)}
.pill-login:active{transform:scale(.96)}
.pill-create{width:100%;padding:17px 28px;border-radius:100px;border:2px solid rgba(255,255,255,.55);background:rgba(255,255,255,.08);color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px);transition:background .2s,border-color .2s}
.pill-create:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.8)}
.pill-g-icon{width:20px;height:20px;flex-shrink:0}
.auth-demo-link{display:block;width:100%;text-align:center;background:none;border:none;padding:8px;font-family:'Outfit',sans-serif;font-size:13px;color:rgba(255,255,255,.42);font-weight:500;cursor:pointer;transition:color .2s}
.auth-demo-link:hover{color:rgba(255,255,255,.7)}
.auth-feats{display:flex;gap:20px;margin-bottom:30px;flex-wrap:wrap}
.auth-feat-chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:5px 12px;border-radius:100px;backdrop-filter:blur(8px)}
.auth-feat-dot{width:5px;height:5px;border-radius:50%;background:#4A9AFF;flex-shrink:0}
@media(min-width:900px){.auth-bottom{max-width:460px;margin:0 auto;padding-left:40px;padding-right:40px}.auth-topbar{padding-left:40px}}

/* ══ GOOGLE SHEET ══ */
.gsheet-bg{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.gsheet-bg.show{display:flex}
.gsheet{background:#fff;border-radius:28px 28px 0 0;padding:10px 28px calc(40px + var(--sb));width:100%;max-width:480px;animation:slideUp .32s cubic-bezier(0.34,1.56,0.64,1)}
@media(min-width:900px){.gsheet-bg{align-items:center}.gsheet{border-radius:22px;padding-bottom:36px;max-width:420px}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.gs-pill{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 22px}
@media(min-width:900px){.gs-pill{display:none}}
.gs-brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.gs-brand-dot{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;box-shadow:0 4px 12px var(--glow);flex-shrink:0}
.gs-brand-name{font-size:17px;font-weight:800;color:var(--ink)}
.gs-headline{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.4px;margin-bottom:6px;margin-top:18px}
.gs-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.55;font-weight:400}
.gs-google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:16px 24px;border-radius:14px;background:#fff;border:2px solid var(--border);font-size:15px;font-weight:700;color:var(--ink);font-family:'Outfit',sans-serif;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:12px;transition:box-shadow .2s,transform .15s var(--ease-spring)}
.gs-google-btn:hover{box-shadow:0 6px 20px rgba(0,0,0,.12);transform:translateY(-1px)}
.gs-note{font-size:12px;color:var(--muted);text-align:center;line-height:1.6}
.gs-note a{color:var(--blue);text-decoration:none;font-weight:600}
.gs-close{position:absolute;top:16px;right:20px;width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.gs-close-wrap{position:relative}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:calc(24px + var(--sb));left:50%;
  transform:translateX(-50%) translateY(16px) scale(.92);
  background:rgba(0,26,77,.93);color:#fff;
  padding:12px 22px;border-radius:30px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;
  transition:opacity .28s,transform .28s var(--ease-spring);
  z-index:1000;white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,.28);
  backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
</style>
</head>
<body>

<div class="init-loader" id="initLoader">
  <div class="loader-ring"></div>
  <div style="font-family:'Outfit',sans-serif;font-weight:800;color:#fff;font-size:18px">VynixRide</div>
</div>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-bg"></div><div class="auth-scrim"></div>
  <div class="auth-topbar">
    <div class="auth-logo-dot">VX</div>
    <div class="auth-logo-name">VynixRide</div>
  </div>
  <div class="auth-spacer"></div>
  <div class="auth-bottom">
    <div class="auth-feats">
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Fast booking</div>
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Live tracking</div>
      <div class="auth-feat-chip"><div class="auth-feat-dot"></div>Secure pay</div>
    </div>
    <div class="auth-headline">Your city,<br>your ride.</div>
    <div class="auth-subline">Fast, safe, and affordable rides anywhere in South Africa.</div>
    <div class="auth-pills">
      <button class="pill-login" id="btnLogin">
        <svg class="pill-g-icon" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/></svg>
        Log In
      </button>
      <button class="pill-create" id="btnCreate">Create an Account</button>
    </div>
    <button class="auth-demo-link" id="skipAuth">Continue without an account →</button>
  </div>
</div>

<div class="gsheet-bg" id="googleSheetBg">
  <div class="gsheet">
    <div class="gs-pill"></div>
    <div class="gs-close-wrap">
      <button class="gs-close" id="gsClose">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="gs-brand"><div class="gs-brand-dot">VX</div><div class="gs-brand-name">VynixRide</div></div>
    <div class="gs-headline" id="gsHeadline">Welcome back</div>
    <div class="gs-sub" id="gsSub">Sign in with Google to book rides and manage your wallet.</div>
    <button class="gs-google-btn" id="gsGoogleBtn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/></svg>
      <span id="gsBtnLabel">Continue with Google</span>
    </button>
    <div class="gs-note">By continuing you agree to VynixRide's <a href="#">Terms of Service</a>.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app=initializeApp({
  apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",
  authDomain:"fire-b-a8878.firebaseapp.com",
  databaseURL:"https://fire-b-a8878.firebaseio.com",
  projectId:"fire-b-a8878",
  storageBucket:"fire-b-a8878.firebasestorage.app",
  messagingSenderId:"658673187627",
  appId:"1:658673187627:web:32699cbc33e85f4bafa36e"
});
const auth=getAuth(app);
const gp=new GoogleAuthProvider();
gp.setCustomParameters({prompt:'select_account'});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

onAuthStateChanged(auth,u=>{
  document.getElementById('initLoader').classList.add('hide');
  // If already signed in, go straight to the app
  if(u){
    localStorage.removeItem('vx_guest_mode');
    window.location.href='index.html';
  }
});

function openGoogleSheet(mode){
  const b=document.getElementById('googleSheetBg');
  document.getElementById('gsHeadline').textContent=mode==='create'?'Create your account':'Welcome back';
  document.getElementById('gsSub').textContent=mode==='create'?'Sign up to book rides, track trips, and manage your wallet.':'Sign in to continue booking rides.';
  document.getElementById('gsBtnLabel').textContent=mode==='create'?'Sign up with Google':'Continue with Google';
  b.classList.add('show');
}
function closeGoogleSheet(){document.getElementById('googleSheetBg').classList.remove('show');}

document.getElementById('btnLogin').onclick=()=>openGoogleSheet('login');
document.getElementById('btnCreate').onclick=()=>openGoogleSheet('create');
document.getElementById('skipAuth').onclick=()=>{
  localStorage.setItem('vx_guest_mode','1');
  window.location.href='index.html';
};
document.getElementById('gsClose').onclick=closeGoogleSheet;
document.getElementById('googleSheetBg').addEventListener('click',e=>{
  if(e.target===document.getElementById('googleSheetBg'))closeGoogleSheet();
});
document.getElementById('gsGoogleBtn').onclick=()=>{
  closeGoogleSheet();
  signInWithPopup(auth,gp)
    .then(()=>{ window.location.href='index.html'; })
    .catch(()=>showToast('Sign-in cancelled'));
};
</script>
</body>
</html>
