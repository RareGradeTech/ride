<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Login - VynixRide</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1A3BFF;--blue2:#4A6CFF;--glow:rgba(26,59,255,.2);
  --ink:#0C0C14;--bg:#EEF0FA;--card:#fff;--muted:#7C7C96;
  --border:#E2E4F0;--green:#17A85A;--red:#E53535;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--bg);}

/* ── AUTH OVERLAY ──────────────────────────────────────────────────── */
.auth-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-card {
  background: var(--card); width: 100%; max-width: 420px; border-radius: 28px;
  padding: 40px 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  text-align: center; border: 1px solid var(--border);
}
.auth-logo {
  width: 64px; height: 64px; background: var(--blue); border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; font-weight: 800; margin: 0 auto 24px;
  box-shadow: 0 8px 24px var(--glow); font-family: 'Syne', sans-serif;
}
.auth-h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
.auth-p { color: var(--muted); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }

.auth-btn {
  width: 100%; height: 54px; border-radius: 14px; border: 1.5px solid var(--border);
  background: #fff; display: flex; align-items: center; justify-content: center;
  gap: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
  color: var(--ink); font-family: 'DM Sans', sans-serif;
}
.auth-btn:hover { background: #f8f9ff; border-color: var(--blue); }
.auth-btn:active { transform: scale(0.98); }

.auth-sep { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
.auth-sep-line { flex: 1; height: 1px; background: var(--border); }
.auth-sep-txt { font-size: 13px; color: var(--muted); font-weight: 500; }

.auth-skip {
  background: none; border: none; color: var(--blue); font-size: 14px;
  font-weight: 600; cursor: pointer; padding: 8px; transition: 0.2s;
}
.auth-skip:hover { opacity: 0.8; }

.auth-trust {
  margin-top: 32px; font-size: 12px; color: var(--muted);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.auth-trust-icon { font-size: 14px; }
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-logo">VX</div>
    <h1 class="auth-h1">Welcome to Vynix</h1>
    <p class="auth-p">The premium ride-hailing experience. Sign in to start your journey.</p>
    
    <button class="auth-btn" id="googleLogin">
      <svg width="19" height="19" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/></svg>
      Continue with Google
    </button>

    <div class="auth-sep">
      <div class="auth-sep-line"></div>
      <div class="auth-sep-txt">or</div>
      <div class="auth-sep-line"></div>
    </div>

    <button class="auth-skip" id="skipAuth">Explore in demo mode →</button>

    <div class="auth-trust">
      <span class="auth-trust-icon">🔒</span>
      Your data is encrypted and never shared
    </div>
  </div>
</div>

<script type="module">
  // Mock login logic for demonstration
  // In a real app, you would use Firebase Auth or similar here
  
  document.getElementById('googleLogin').onclick = () => {
    localStorage.setItem('vynix_auth', 'true');
    localStorage.setItem('vynix_user', JSON.stringify({
      name: 'John Doe',
      email: 'john@example.com'
    }));
    window.location.href = 'index.html';
  };

  document.getElementById('skipAuth').onclick = () => {
    localStorage.setItem('vynix_auth', 'demo');
    window.location.href = 'index.html';
  };

  // Check if already logged in
  if (localStorage.getItem('vynix_auth')) {
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
