<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VynixRide — Your city, your ride</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0052FF;--blue2:#3377FF;--glow:rgba(0,82,255,.28);
  --ink:#001A4D;--bg:#F4F7FF;--border:#DDE5F5;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0,0.2,1);
  --ease-decel:cubic-bezier(0.05,0.7,0.1,1.0);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#000}

/* ── PAGE TRANSITION OUT ── */
@keyframes pageOut{to{opacity:0;transform:scale(1.04)}}
@keyframes pageIn{from{opacity:0;transform:scale(.96) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
body.exiting .auth-wrap{animation:pageOut .45s var(--ease-smooth) forwards}
body.entering .auth-wrap{animation:pageIn .55s var(--ease-decel) forwards}

.auth-wrap{
  position:fixed;inset:0;display:flex;flex-direction:column;
  background:#000;
}

/* ── BG IMAGE ── */
.auth-bg{
  position:absolute;inset:0;
  background:url('https://i.postimg.cc/FHXNkL7D/c-SZtc.jpg') center/cover no-repeat;
  will-change:transform;
  animation:kenBurns 20s ease-in-out infinite alternate;
}
@keyframes kenBurns{
  0%{transform:scale(1) translateX(0)}
  33%{transform:scale(1.06) translateX(-10px) translateY(-6px)}
  66%{transform:scale(1.1) translateX(8px) translateY(4px)}
  100%{transform:scale(1.05) translateX(-4px) translateY(-10px)}
}

/* ── SCRIM ── */
.auth-scrim{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 30% 40%,rgba(0,40,140,.15) 0%,transparent 60%),
    linear-gradient(to bottom,
      rgba(0,10,40,.1) 0%,
      rgba(0,15,60,.3) 25%,
      rgba(0,20,70,.65) 55%,
      rgba(0,10,40,.96) 100%
    );
}

/* ── CONTENT ── */
.auth-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  height:100%;padding:0 28px;
  padding-top:calc(var(--st) + 52px);
  padding-bottom:calc(var(--sb) + 44px);
}

/* ── TOP BAR ── */
.auth-topbar{
  display:flex;align-items:center;gap:13px;
  margin-bottom:auto;
}
.auth-logo{
  width:46px;height:46px;background:rgba(255,255,255,.95);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:15px;color:var(--blue);
  box-shadow:0 6px 24px rgba(0,0,0,.35);
  flex-shrink:0;
  animation:logoPop .6s var(--ease-spring) .1s both;
}
@keyframes logoPop{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.auth-brand{
  font-size:24px;font-weight:800;color:#fff;
  letter-spacing:-.4px;
  text-shadow:0 2px 16px rgba(0,0,0,.4);
  animation:fadeUp .5s var(--ease-decel) .2s both;
}

/* ── HERO TEXT ── */
.auth-hero{
  margin-bottom:32px;
  animation:fadeUp .55s var(--ease-decel) .3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.auth-chips{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;
}
.auth-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 13px;border-radius:100px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  font-size:12px;font-weight:600;color:rgba(255,255,255,.75);
  backdrop-filter:blur(10px);
}
.chip-dot{
  width:5px;height:5px;border-radius:50%;
  background:#4A9AFF;flex-shrink:0;
}

.auth-headline{
  font-size:clamp(34px,9vw,52px);font-weight:900;
  color:#fff;line-height:1.08;letter-spacing:-1.5px;
  text-shadow:0 3px 20px rgba(0,0,0,.35);
  margin-bottom:13px;
}
.auth-headline span{
  background:linear-gradient(90deg,#6AAFFF,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.auth-sub{
  font-size:15px;color:rgba(255,255,255,.6);
  font-weight:400;line-height:1.6;max-width:310px;
}

/* ── BUTTONS ── */
.auth-actions{
  display:flex;flex-direction:column;gap:13px;
  animation:fadeUp .55s var(--ease-decel) .45s both;
}

.btn-google{
  width:100%;padding:18px 26px;border-radius:100px;
  border:none;background:#fff;
  color:#0C0C14;font-family:'Outfit',sans-serif;
  font-size:16px;font-weight:800;letter-spacing:-.1px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
  transition:transform .18s var(--ease-spring),box-shadow .18s,background .15s;
  position:relative;overflow:hidden;
}
.btn-google::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0);
  transition:background .15s;
}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,0,0,.4);}
.btn-google:active{transform:scale(.97);box-shadow:0 4px 16px rgba(0,0,0,.3);}
.g-icon{width:20px;height:20px;flex-shrink:0;}

.btn-create{
  width:100%;padding:17px 26px;border-radius:100px;
  border:2px solid rgba(255,255,255,.45);
  background:rgba(255,255,255,.08);
  color:#fff;font-family:'Outfit',sans-serif;
  font-size:16px;font-weight:700;
  cursor:pointer;
  backdrop-filter:blur(14px);
  transition:transform .18s var(--ease-spring),background .15s,border-color .15s;
  letter-spacing:-.1px;
}
.btn-create:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.65);}
.btn-create:active{transform:scale(.97);}

.btn-demo{
  display:block;width:100%;text-align:center;
  background:none;border:none;padding:10px;
  font-family:'Outfit',sans-serif;font-size:13px;
  color:rgba(255,255,255,.38);font-weight:500;
  cursor:pointer;
  transition:color .2s;letter-spacing:.01em;
}
.btn-demo:hover{color:rgba(255,255,255,.6);}

/* ── GOOGLE SHEET MODAL ── */
.gsheet-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0);
  display:flex;align-items:flex-end;justify-content:center;
  pointer-events:none;
  transition:background .35s;
}
.gsheet-overlay.open{pointer-events:all;background:rgba(0,0,0,.55);}
.gsheet{
  background:#fff;border-radius:28px 28px 0 0;
  width:100%;max-width:480px;
  padding:10px 28px calc(40px + var(--sb));
  transform:translateY(110%);
  transition:transform .42s var(--ease-decel);
  position:relative;
}
.gsheet-overlay.open .gsheet{transform:translateY(0);}
.gs-pill{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 24px;}
.gs-close{
  position:absolute;top:16px;right:20px;
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#667A99;transition:background .15s,transform .18s var(--ease-spring);
}
.gs-close:active{transform:scale(.88);}
.gs-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.gs-brand-dot{
  width:36px;height:36px;background:var(--blue);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:13px;
  box-shadow:0 4px 12px var(--glow);flex-shrink:0;
}
.gs-brand-name{font-size:17px;font-weight:800;color:var(--ink);}
.gs-headline{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.4px;margin-top:18px;margin-bottom:6px;}
.gs-sub{font-size:14px;color:#667A99;margin-bottom:28px;line-height:1.55;font-weight:400;}
.gs-google-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
  padding:16px 24px;border-radius:14px;
  background:#fff;border:2px solid var(--border);
  font-size:15px;font-weight:700;color:var(--ink);
  font-family:'Outfit',sans-serif;cursor:pointer;
  transition:background .18s,transform .1s,box-shadow .18s;
  box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:12px;
}
.gs-google-btn:hover{background:var(--bg);box-shadow:0 4px 18px rgba(0,0,0,.1);}
.gs-google-btn:active{transform:scale(.98);}
.gs-note{font-size:12px;color:#667A99;text-align:center;line-height:1.6;}
.gs-note a{color:var(--blue);text-decoration:none;font-weight:600;}

/* ── PARTICLES ── */
.particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.particle{
  position:absolute;width:2px;height:2px;
  border-radius:50%;background:rgba(255,255,255,.5);
  animation:particleDrift linear infinite;
}
@keyframes particleDrift{
  from{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.6}
  to{transform:translateY(-10vh) translateX(var(--drift));opacity:0}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--sb) + 16px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(0,10,40,.92);color:#fff;
  padding:11px 22px;border-radius:30px;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;
  transition:.25s;z-index:999;white-space:nowrap;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:700px){
  .auth-content{max-width:460px;margin:0 auto;padding-left:40px;padding-right:40px;}
  .gsheet{border-radius:22px;max-width:420px;padding-bottom:36px;}
  .gsheet-overlay{align-items:center;}
}
</style>
</head>
<body class="entering">

<div class="auth-wrap" id="authWrap">
  <div class="auth-bg"></div>
  <div class="auth-scrim"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="auth-content">
    <div class="auth-topbar">
      <div class="auth-logo">VX</div>
      <div class="auth-brand">VynixRide</div>
    </div>

    <div class="auth-hero">
      <div class="auth-chips">
        <div class="auth-chip"><div class="chip-dot"></div>Fast booking</div>
        <div class="auth-chip"><div class="chip-dot"></div>Live tracking</div>
        <div class="auth-chip"><div class="chip-dot"></div>Secure pay</div>
      </div>
      <div class="auth-headline">Your city,<br><span>your ride.</span></div>
      <div class="auth-sub">Fast, safe, and affordable rides anywhere in South Africa.</div>
    </div>

    <div class="auth-actions">
      <button class="btn-google" id="btnLogin">
        <svg class="g-icon" viewBox="0 0 48 48">
          <path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/>
          <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/>
          <path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/>
          <path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/>
        </svg>
        Log In with Google
      </button>
      <button class="btn-create" id="btnCreate">Create an Account</button>
      <button class="btn-demo" id="btnDemo">Continue without an account →</button>
    </div>
  </div>
</div>

<!-- Google Sheet Modal -->
<div class="gsheet-overlay" id="gsOverlay">
  <div class="gsheet">
    <div class="gs-pill"></div>
    <button class="gs-close" id="gsClose">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="gs-brand">
      <div class="gs-brand-dot">VX</div>
      <div class="gs-brand-name">VynixRide</div>
    </div>
    <div class="gs-headline" id="gsHeadline">Welcome back</div>
    <div class="gs-sub" id="gsSub">Sign in with Google to book rides and manage your wallet.</div>
    <button class="gs-google-btn" id="gsGoogleBtn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M44.5 20H24v8.5h11.9C34.5 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.2-2.7-.2-4z"/>
        <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.4 19.2 14 24 14c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.3 6 29.4 4 24 4 16.2 4 9.5 8.4 6.3 14.7z"/>
        <path fill="#FBBC05" d="M24 44c5.3 0 10.1-1.8 13.8-4.8l-6.4-5.4C29.5 35.5 26.9 36 24 36c-5.9 0-10.5-3.9-11.9-9.1l-7 5.4C8.4 39.6 15.6 44 24 44z"/>
        <path fill="#EA4335" d="M44.5 20H24v8.5h11.9c-.6 3-2.5 5.5-5.1 7.3l6.4 5.4C41.9 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.2-4z"/>
      </svg>
      <span id="gsBtnLabel">Continue with Google</span>
    </button>
    <div class="gs-note">By continuing you agree to VynixRide's <a href="#">Terms of Service</a>.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app=initializeApp({apiKey:"AIzaSyBOyZ3As4GTuNvjemvPF_SpsC6m6vqtNhc",authDomain:"fire-b-a8878.firebaseapp.com",databaseURL:"https://fire-b-a8878.firebaseio.com",projectId:"fire-b-a8878",storageBucket:"fire-b-a8878.firebasestorage.app",messagingSenderId:"658673187627",appId:"1:658673187627:web:32699cbc33e85f4bafa36e"});
const auth=getAuth(app),gp=new GoogleAuthProvider();
gp.setCustomParameters({prompt:'select_account'});

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}

function navigateToApp(){
  document.body.classList.add('exiting');
  document.body.classList.remove('entering');
  setTimeout(()=>{window.location.href='app.html';},420);
}

onAuthStateChanged(auth,u=>{
  if(u){navigateToApp();}
});

/* ── Particles ── */
const pc=document.getElementById('particles');
for(let i=0;i<18;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;--drift:${(Math.random()-0.5)*120}px;animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*12}s;opacity:${0.2+Math.random()*0.5}`;
  pc.appendChild(p);
}

/* ── Sheet ── */
let sheetMode='login';
function openSheet(mode){
  sheetMode=mode;
  document.getElementById('gsHeadline').textContent=mode==='create'?'Create your account':'Welcome back';
  document.getElementById('gsSub').textContent=mode==='create'?'Sign up to book rides, track trips, and manage your wallet.':'Sign in with Google to continue booking rides.';
  document.getElementById('gsBtnLabel').textContent=mode==='create'?'Sign up with Google':'Continue with Google';
  document.getElementById('gsOverlay').classList.add('open');
}
function closeSheet(){document.getElementById('gsOverlay').classList.remove('open');}
document.getElementById('btnLogin').addEventListener('click',()=>openSheet('login'));
document.getElementById('btnCreate').addEventListener('click',()=>openSheet('create'));
document.getElementById('gsClose').addEventListener('click',closeSheet);
document.getElementById('gsOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('gsOverlay'))closeSheet();});
document.getElementById('gsGoogleBtn').addEventListener('click',()=>{closeSheet();signInWithPopup(auth,gp).catch(()=>showToast('Sign-in cancelled'));});
document.getElementById('btnDemo').addEventListener('click',()=>{sessionStorage.setItem('vx_demo','1');navigateToApp();});
</script>
</body>
</html>
